<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>結果発表</title>
    <link rel="stylesheet" href="./result.css" />
  </head>
  <body>
    <main class="result-app">
      <section class="standby-view" id="standbyPanel">
        <header class="top-bar">
          <div>
            <p class="eyebrow">FINAL RESULT</p>
            <h1 id="projectName">結果発表</h1>
          </div>
          <button class="icon-button" id="refreshButton" type="button">更新</button>
        </header>

        <section class="status-board">
          <div>
            <span>提出状況</span>
            <strong id="submitCount">0 / 0</strong>
          </div>
          <div>
            <span>状態</span>
            <strong id="readyState">確認中</strong>
          </div>
        </section>

        <section class="preview-board">
          <div class="section-title">
            <p class="eyebrow">RANKING</p>
            <h2>現在の集計</h2>
          </div>
          <div class="ranking-list" id="rankingList"></div>
        </section>

        <button class="start-button" id="startRevealButton" type="button" disabled>結果発表</button>
      </section>

      <section class="m1-stage hidden" id="revealStage">
        <button class="icon-button back-button" id="backButton" type="button">戻る</button>
        <div class="m1-broadcast-board" id="broadcastBoard">
          <div class="m1-header">
            <span>FINAL RESULT</span>
            <strong id="stageProjectName">結果発表</strong>
          </div>

          <div class="m1-team-plate">
            <span id="revealOrder">READY</span>
            <strong id="revealTeam">READY</strong>
          </div>

          <div class="judge-score-grid" id="judgeScoreGrid"></div>

          <div class="total-reveal" id="totalReveal">
            <span>TOTAL SCORE</span>
            <strong id="revealScore">---</strong>
          </div>

          <div class="final-ranking hidden" id="finalRanking"></div>
        </div>
      </section>

      <div class="toast hidden" id="messageBox"></div>
    </main>

    <script src="./result.js"></script>
  </body>
</html>
