<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#32080;&#26524;&#30330;&#34920;</title>
    <link rel="stylesheet" href="./result.css" />
  </head>
  <body>
    <div class="app-shell result-only-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">FINAL RESULT</p>
          <h1 id="projectName">&#32080;&#26524;&#30330;&#34920;</h1>
        </div>
        <div class="topbar-actions">
          <button class="secondary-button" id="refreshButton" type="button">&#26356;&#26032;</button>
        </div>
      </header>

      <main class="workspace">
        <section class="view active" id="resultView">
          <div class="result-stage">
            <div class="stage-copy">
              <p class="eyebrow">FINAL RESULT</p>
              <h2 id="resultTitle">&#32080;&#26524;&#30330;&#34920;</h2>
              <p id="resultLead">&#25505;&#28857;&#12487;&#12540;&#12479;&#12434;&#35501;&#12415;&#36796;&#12435;&#12391;&#12356;&#12414;&#12377;&#12290;</p>
            </div>
            <div class="reveal-board">
              <div class="reveal-judge-strip" id="revealJudgeStrip"></div>
              <div class="reveal-team" id="revealTeam">&#24453;&#27231;&#20013;</div>
              <div class="judge-score-line" id="judgeScoreLine"></div>
              <div class="reveal-score" id="revealScore">---</div>
              <div class="reveal-sub" id="revealSub">Ready</div>
            </div>
            <label class="project-select-panel" for="projectSelect">
              <span class="project-select-label">&#25505;&#28857;&#12503;&#12525;&#12472;&#12455;&#12463;&#12488;</span>
              <span class="project-select-control">
                <select id="projectSelect" class="project-select"></select>
              </span>
            </label>
            <div class="result-actions">
              <button class="secondary-button reveal-start-button" id="startRevealButton" type="button" disabled>&#30330;&#34920;&#38283;&#22987;</button>
            </div>
          </div>

          <div class="reveal-flow hidden" id="revealFlow">
            <div class="reveal-flow-head">
              <div>
                <p class="eyebrow">SCORE REVEAL</p>
                <h2>&#24471;&#28857;&#30330;&#34920;</h2>
              </div>
              <button class="secondary-button" id="backResultButton" type="button">&#25147;&#12427;</button>
            </div>
            <div class="score-matrix" id="scoreMatrix"></div>
          </div>

          <div class="ranking-list hidden" id="rankingList"></div>
        </section>
      </main>

      <template id="emptyTemplate">
        <div class="empty-state">
          <strong>&#12414;&#12384;&#38598;&#35336;&#12391;&#12365;&#12427;&#25505;&#28857;&#12364;&#12354;&#12426;&#12414;&#12379;&#12435;</strong>
          <span>&#25505;&#28857;&#32773;&#12398;&#25552;&#20986;&#24460;&#12395;&#32080;&#26524;&#30330;&#34920;&#12391;&#12365;&#12414;&#12377;&#12290;</span>
        </div>
      </template>

      <div class="toast hidden" id="messageBox"></div>
    </div>

    <script src="./result.js"></script>
  </body>
</html>
